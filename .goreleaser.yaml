version: 2

builds:
  - id: croncontrol
    main: .
    binary: croncontrol
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}

  - id: croncontrol-worker
    main: ./cmd/croncontrol-worker
    binary: croncontrol-worker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

  - id: cronctl
    main: ./cmd/cronctl
    binary: cronctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: croncontrol-mcp
    main: ./cmd/croncontrol-mcp
    binary: croncontrol-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

kos:
  - repository: ghcr.io/croncontrol/croncontrol
    tags:
      - "{{.Version}}"
      - latest
    bare: true
    base_image: cgr.dev/chainguard/static
    platforms:
      - linux/amd64
      - linux/arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
