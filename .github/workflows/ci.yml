name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: croncontrol
          POSTGRES_PASSWORD: croncontrol
          POSTGRES_DB: croncontrol
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Go mod verify
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1
        env:
          CC_DATABASE_HOST: localhost
          CC_DATABASE_PORT: 5432
          CC_DATABASE_USER: croncontrol
          CC_DATABASE_PASSWORD: croncontrol
          CC_DATABASE_NAME: croncontrol

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [test, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t croncontrol:test .
