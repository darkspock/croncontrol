server:
  port: 8090

# Local development only — matches docker-compose.yaml
database:
  host: localhost
  port: 5435
  user: croncontrol
  password: croncontrol
  name: croncontrol
  sslmode: disable

planner:
  interval: 1h
  horizon: 24h

executor:
  interval: 30s

monitor:
  interval: 30s

concurrency:
  max_global: 50
  max_http: 20
  max_ssh: 5
  max_ssm: 10
  max_k8s: 20

auth:
  session_secret: dev-session-secret-change-in-prod
  encryption_key: dev-encryption-key-32bytes!!!!

retention:
  slots: 30d
  output: 30d
  heartbeats: 30d
  jobs: 30d
  job_attempts: 30d
  audit: 90d
  cleanup_schedule: "03:00"
  cleanup_batch_size: 1000

logging:
  # backend: database | file | opensearch
  backend: database
  level: info
  # File backend options:
  # file_path: ./data/logs
  # OpenSearch backend options:
  # opensearch_url: http://localhost:9200
  # opensearch_auth: admin:admin

infra:
  enabled: false                         # enable auto-provisioning
  provider: hetzner                      # only hetzner for now
  # hetzner_api_token: ""                # CC_INFRA_HETZNER_API_TOKEN
  datacenter: fsn1                       # fsn1, nbg1, hel1
  server_type: cx22                      # cx22 = 2 vCPU, 4GB RAM
  # ssh_key_name: croncontrol            # pre-created in Hetzner
  # swarm_manager_ip: ""                 # IP of the Swarm manager
  # swarm_join_token: ""                 # docker swarm join-token worker
  grace_period: 1h                       # idle before destroy
  max_servers_per_workspace: 10
  # infra_secret: ""                     # for server ready callback auth

saas:
  registration_enabled: true
  disposable_email_check: true
  base_url: http://localhost:8090
  # Bootstrap a platform admin on startup (set email of the admin user):
  # platform_admin_email: admin@example.com
