repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.1.0
    hooks:
      - id: golangci-lint-full

  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        files: '\.go$'
        pass_filenames: false

      - id: generate-api
        name: generate API code
        entry: just generate-api
        language: system
        files: '(openapi\.yaml|\.oapi-codegen\.yaml)$'
        pass_filenames: false

      - id: generate-db
        name: generate DB code
        entry: just generate-db
        language: system
        files: '(db/queries/.*\.sql|db/sqlc\.yaml|migrations/)$'
        pass_filenames: false

      - id: atlas-validate
        name: validate migrations
        entry: just migrate-validate
        language: system
        files: 'migrations/'
        pass_filenames: false
        stages: [manual]
